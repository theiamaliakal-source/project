<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Climate Tracker | Donate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { deepblue: '#111827', navblue: '#030712', cardblue: '#1f2937', } } }
    }
  </script>
  <style>
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-scale { opacity: 0; animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-deepblue font-sans text-white min-h-screen flex flex-col selection:bg-blue-200">
  
  <nav class="bg-navblue sticky top-0 z-50 border-b border-white/10 shadow-lg">
    <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center h-16 text-white">
      <a href="index.html" class="flex items-center gap-2 focus:outline-none">
         <span class="text-xl font-medium tracking-wide">Climate Tracker</span>
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="index.html" class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Home</a>
        <a href="data.html" class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Data</a>
        <a href="impact.html" class="text-sm font-medium text-slate-300 hover:text-white transition-colors">Impact Analysis</a>
        <a href="news.html" class="text-sm font-medium text-slate-300 hover:text-white transition-colors">News</a>
      </div>
      <div class="hidden md:flex items-center gap-4">
        <input type="text" placeholder="Search..." class="bg-white text-slate-900 rounded-md px-3 py-1.5 text-sm outline-none w-48 focus:ring-2 focus:ring-blue-500 shadow-sm">
        <a href="donate.html" class="bg-blue-600 text-white px-4 py-1.5 text-sm font-bold rounded-[4px] hover:bg-blue-500 transition-colors shadow-sm">Donate</a>
      </div>
    </div>
  </nav>

  <main class="flex-1 w-full relative overflow-hidden flex items-center justify-center p-6 bg-navblue">
    <div id="donate-form-view" class="w-full max-w-lg bg-cardblue p-8 md:p-12 rounded-3xl shadow-2xl border border-white/10 animate-scale block">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
          <i data-lucide="heart" class="w-8 h-8 text-blue-400 fill-blue-400"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white">Support Relief Efforts</h2>
        <p class="text-slate-400 mt-2 text-sm">Your contribution goes directly towards communities recovering from devastating weather phenomena.</p>
      </div>

      <div class="space-y-6">
        <div class="grid grid-cols-4 gap-3">
          <button data-amt="10" class="donate-btn py-3 rounded-[4px] font-bold text-lg transition-all bg-navblue text-slate-300 hover:bg-slate-700 border border-white/5">$10</button>
          <button data-amt="50" class="donate-btn py-3 rounded-[4px] font-bold text-lg transition-all bg-blue-600 text-white shadow-lg shadow-blue-600/30 border border-transparent">$50</button>
          <button data-amt="100" class="donate-btn py-3 rounded-[4px] font-bold text-lg transition-all bg-navblue text-slate-300 hover:bg-slate-700 border border-white/5">$100</button>
          <button data-amt="250" class="donate-btn py-3 rounded-[4px] font-bold text-lg transition-all bg-navblue text-slate-300 hover:bg-slate-700 border border-white/5">$250</button>
        </div>

        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="text-slate-500 font-bold">$</span>
          </div>
          <input type="number" id="custom-amount" placeholder="Custom Amount" class="w-full pl-8 pr-4 py-4 rounded-[4px] border border-white/10 bg-navblue text-white focus:bg-deepblue focus:ring-2 outline-none focus:ring-blue-500 focus:border-blue-500 font-bold transition-colors">
        </div>

        <button id="submit-donate" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-[4px] transition-all shadow-lg shadow-blue-500/20 active:scale-[0.98]">
          Complete Donation
        </button>
      </div>
    </div>

    <!-- Success View -->
    <div id="donate-success-view" class="w-full max-w-md text-center p-8 bg-cardblue rounded-3xl shadow-2xl border border-white/10 hidden">
      <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-green-500/30">
        <i data-lucide="check-circle-2" class="w-10 h-10 text-green-400"></i>
      </div>
      <h2 class="text-3xl font-extrabold text-white mb-2">Thank You!</h2>
      <p class="text-slate-400">Your mock transaction has been completed successfully.</p>
      <button onclick="resetDonation()" class="mt-8 text-blue-400 font-bold hover:underline">Reset Mock Donation</button>
    </div>
  </main>
  
  <script src="app.js"></script>
  <script>
    let currentAmount = 50;
    const btns = document.querySelectorAll('.donate-btn');
    const customInput = document.getElementById('custom-amount');
    const submitBtn = document.getElementById('submit-donate');
    const formView = document.getElementById('donate-form-view');
    const successView = document.getElementById('donate-success-view');

    function updateSelection() {
      btns.forEach(b => {
        if (!customInput.value && parseInt(b.dataset.amt) === currentAmount) {
          b.className = 'donate-btn py-3 rounded-[4px] font-bold text-lg transition-all bg-blue-600 text-white shadow-lg shadow-blue-600/30 border border-transparent';
        } else {
          b.className = 'donate-btn py-3 rounded-[4px] font-bold text-lg transition-all bg-navblue text-slate-300 hover:bg-slate-700 border border-white/5';
        }
      });
      submitBtn.disabled = (!currentAmount && !customInput.value);
      submitBtn.style.opacity = submitBtn.disabled ? '0.5' : '1';
    }

    btns.forEach(btn => btn.addEventListener('click', () => {
      currentAmount = parseInt(btn.dataset.amt);
      customInput.value = '';
      updateSelection();
    }));

    customInput.addEventListener('input', (e) => {
      currentAmount = null;
      updateSelection();
    });

    submitBtn.addEventListener('click', () => {
      const amt = customInput.value ? customInput.value : currentAmount;
      if (amt) {
        formView.classList.add('hidden');
        successView.classList.remove('hidden');
        successView.classList.add('animate-scale');
      }
    });

    function resetDonation() {
      currentAmount = 50;
      customInput.value = '';
      updateSelection();
      successView.classList.add('hidden');
      formView.classList.remove('hidden');
    }
  </script>
</body>
</html>
